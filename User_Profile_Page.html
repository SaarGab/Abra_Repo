<head>

<form id="profileForm">
    <label>Upload Profile Picture: </label>
    <input type="file" id="profilePicInput" accept="image/*">
    <br>

    <img id="profilePreview" src="" alt="Profile Preview">
    <br>

    <label>Full Name: </label>
    <input type="text">
    <br>

    <input type="email">
    <br>

    <input type="tel">
    <br>

    <label>Bio: </label>
    <textarea></textarea>
    <br>

    <button type="submit">Submit</button>
</form>
